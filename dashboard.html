<!DOCTYPE html>
<html>

<head>
<title>User Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>LifeLine User Dashboard</h1>
<button onclick="logout()">Logout</button>
</header>


<div class="dashboard-container">

<div class="card">
<h2>My Profile</h2>
<p id="profileName"></p>
<p id="profileEmail"></p>
<p id="profileCity"></p>
</div>


<div class="card">
<h2>Register as Blood Donor</h2>

<select id="bloodGroup">
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>
</select>

<select id="availability">
<option>Available</option>
<option>Unavailable</option>
</select>

<button onclick="registerDonor()">Become Donor</button>

</div>


<div class="card">
<h2>Search Blood Donor</h2>

<select id="searchBlood">
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>
</select>

<input type="text" id="searchCity" placeholder="City">

<button onclick="searchDonor()">Search</button>

<div id="donorResults"></div>

</div>


<div class="card">
<h2>Emergency Blood Request</h2>

<input type="text" id="patientName" placeholder="Patient Name">

<input type="text" id="hospital" placeholder="Hospital">

<select id="requestBlood">
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>
</select>

<select id="urgency">
<option>Normal</option>
<option>Urgent</option>
<option>Critical</option>
</select>

<button onclick="createRequest()">Submit Request</button>

</div>

</div>

<script src="dashboard.js"></script>

</body>

</html>
